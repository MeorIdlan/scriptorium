services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - ./server/src:/app/src
      - ./server/data:/app/data
    command: npm run dev

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    command: npm run dev
    depends_on:
      - server
